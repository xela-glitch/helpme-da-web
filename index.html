<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Help-Me DA Vers. web</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Assistenza digitale</p>
        <h1>Help-Me DA Vers. web</h1>
        <p class="header-copy">
          Chat intelligente per assistenza IT.
        </p>
      </div>
      <div class="status-pill">
        <span>@</span>
        <span>a2x@hotmail.it</span>
      </div>
    </header>

    <main class="app-shell">

      <!-- 🔥 CHAT -->
      <section class="workspace">
        <div class="panel result-panel">

          <div class="section-heading">
            <p class="eyebrow">Chat AI</p>
            <h2>Assistente IT</h2>
          </div>

          <div class="chat-container">

            <!-- messaggi -->
            <div id="chat-box" class="chat-box"></div>

            <!-- input -->
            <div class="chat-input-container">
              <input id="chat-input" placeholder="Descrivi il tuo problema IT..." />
              <button id="send-btn">Invia</button>
            </div>

          </div>

        </div>
      </section>

    </main>

    <script src="app.js"></script>
  </body>
</html>
